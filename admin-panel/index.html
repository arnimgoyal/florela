<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Florela — Admin Panel</title>
<meta name="description" content="Admin panel for managing Florela website images and configuration.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f14;
  --bg-card: #1a1a24;
  --bg-card-hover: #222233;
  --bg-glass: rgba(26, 26, 36, 0.7);
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text: #e4e4eb;
  --text-muted: #8b8b9e;
  --text-dim: #5a5a6e;
  --rose: #f43f5e;
  --rose-glow: rgba(244,63,94,0.15);
  --rose-soft: rgba(244,63,94,0.08);
  --petal: #fecdd3;
  --green: #34d399;
  --green-glow: rgba(52,211,153,0.15);
  --amber: #fbbf24;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

h1, h2, h3 { font-family: 'Young Serif', serif; }

/* ═══════════ Topbar ═══════════ */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15,15,20,0.85);
  backdrop-filter: blur(20px) saturate(1.2);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
}
.topbar-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}
.topbar-left {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.topbar-logo {
  font-family: 'Young Serif', serif;
  font-size: 1.4rem;
  color: var(--rose);
  text-decoration: none;
  letter-spacing: -0.02em;
}
.topbar-badge {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  background: var(--rose-soft);
  color: var(--rose);
  padding: 0.25rem 0.6rem;
  border-radius: 9999px;
  border: 1px solid rgba(244,63,94,0.15);
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 1rem;
  border-radius: 9999px;
  font-size: 0.8rem;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
  font-family: inherit;
}
.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover {
  background: var(--bg-card);
  color: var(--text);
  border-color: var(--border-hover);
}
.btn-primary {
  background: var(--rose);
  color: #fff;
  box-shadow: 0 0 20px var(--rose-glow);
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 24px var(--rose-glow);
}
.btn-success {
  background: var(--green);
  color: #0f0f14;
  box-shadow: 0 0 20px var(--green-glow);
}
.btn-success:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 24px var(--green-glow);
}
.btn svg { width: 16px; height: 16px; }

/* ═══════════ Hero / Stats ═══════════ */
.hero {
  padding: 3rem 2rem 2rem;
  max-width: 1280px;
  margin: 0 auto;
}
.hero h1 {
  font-size: 2rem;
  color: var(--text);
  margin-bottom: 0.5rem;
}
.hero p {
  color: var(--text-muted);
  font-size: 0.95rem;
  max-width: 50ch;
}
.stats-row {
  display: flex;
  gap: 1rem;
  margin-top: 1.5rem;
  flex-wrap: wrap;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 1rem 1.25rem;
  min-width: 140px;
  flex: 1;
}
.stat-value {
  font-size: 1.5rem;
  font-weight: 700;
  font-family: 'Young Serif', serif;
}
.stat-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-top: 0.25rem;
}

/* ═══════════ Section Headers ═══════════ */
.section-group {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 2rem 2rem;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1.25rem;
  padding-top: 1.5rem;
}
.section-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--rose);
  box-shadow: 0 0 8px var(--rose-glow);
}
.section-name {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-muted);
}
.section-count {
  font-size: 0.65rem;
  color: var(--text-dim);
  background: var(--bg-card);
  padding: 0.15rem 0.5rem;
  border-radius: 9999px;
  border: 1px solid var(--border);
}

/* ═══════════ Image Grid ═══════════ */
.image-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.25rem;
}

/* ═══════════ Image Card ═══════════ */
.image-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all var(--transition);
  position: relative;
}
.image-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}
.image-card-preview {
  position: relative;
  aspect-ratio: 1;
  overflow: hidden;
  background: #12121a;
  cursor: pointer;
}
.image-card-preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.image-card:hover .image-card-preview img {
  transform: scale(1.03);
}
.image-overlay {
  position: absolute;
  inset: 0;
  background: rgba(15,15,20,0.6);
  backdrop-filter: blur(2px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  opacity: 0;
  transition: opacity var(--transition);
  cursor: pointer;
}
.image-card:hover .image-overlay {
  opacity: 1;
}
.overlay-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  transition: all var(--transition);
}
.image-card:hover .overlay-icon {
  background: var(--rose);
  border-color: var(--rose);
  box-shadow: 0 0 20px var(--rose-glow);
}
.overlay-text {
  font-size: 0.75rem;
  font-weight: 600;
  color: rgba(255,255,255,0.8);
}

/* Status indicator */
.image-status {
  position: absolute;
  top: 0.75rem;
  right: 0.75rem;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.2rem 0.55rem;
  border-radius: 9999px;
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  backdrop-filter: blur(12px);
}
.status-live {
  background: rgba(52,211,153,0.15);
  color: var(--green);
  border: 1px solid rgba(52,211,153,0.2);
}
.status-modified {
  background: rgba(251,191,36,0.15);
  color: var(--amber);
  border: 1px solid rgba(251,191,36,0.2);
}
.status-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: currentColor;
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Card Body */
.image-card-body {
  padding: 1rem 1.25rem;
}
.image-card-label {
  font-family: 'Young Serif', serif;
  font-size: 1rem;
  margin-bottom: 0.5rem;
}
.image-card-id {
  font-size: 0.65rem;
  color: var(--text-dim);
  font-family: 'SF Mono', 'Fira Code', monospace;
  background: rgba(255,255,255,0.04);
  padding: 0.15rem 0.4rem;
  border-radius: 4px;
  display: inline-block;
  margin-bottom: 0.75rem;
}

/* Alt text input */
.alt-group {
  position: relative;
}
.alt-label {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  margin-bottom: 0.35rem;
  display: block;
}
.alt-input {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  color: var(--text);
  font-size: 0.8rem;
  padding: 0.5rem 0.65rem;
  font-family: inherit;
  resize: vertical;
  min-height: 60px;
  transition: border-color var(--transition);
  line-height: 1.5;
}
.alt-input:focus {
  outline: none;
  border-color: var(--rose);
  box-shadow: 0 0 0 3px var(--rose-glow);
}

/* Card actions */
.image-card-actions {
  padding: 0 1.25rem 1rem;
  display: flex;
  gap: 0.5rem;
}
.btn-sm {
  padding: 0.35rem 0.7rem;
  font-size: 0.7rem;
}

/* ═══════════ Toast ═══════════ */
.toast-container {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.toast {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.75rem 1.25rem;
  font-size: 0.8rem;
  color: var(--text);
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 0.5rem;
  animation: toast-in 0.3s ease-out;
  backdrop-filter: blur(12px);
}
.toast-success { border-left: 3px solid var(--green); }
.toast-info { border-left: 3px solid var(--rose); }
@keyframes toast-in {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes toast-out {
  from { opacity: 1; transform: translateX(0); }
  to { opacity: 0; transform: translateX(20px); }
}

/* ═══════════ Modal ═══════════ */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
  animation: fade-in 0.2s ease-out;
}
.modal-backdrop.active { display: flex; }
@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  max-width: 520px;
  width: 90%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  animation: modal-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes modal-in {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title {
  font-family: 'Young Serif', serif;
  font-size: 1.15rem;
}
.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 0.25rem;
  border-radius: 6px;
  transition: all var(--transition);
}
.modal-close:hover {
  color: var(--text);
  background: rgba(255,255,255,0.06);
}
.modal-body { padding: 1.5rem; }
.modal-preview {
  width: 100%;
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: #12121a;
  margin-bottom: 1rem;
  border: 1px solid var(--border);
}
.modal-preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ═══════════ Drop zone ═══════════ */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 2rem;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 1rem;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--rose);
  background: var(--rose-soft);
}
.drop-zone-icon {
  width: 40px;
  height: 40px;
  margin: 0 auto 0.75rem;
  color: var(--text-dim);
}
.drop-zone:hover .drop-zone-icon,
.drop-zone.dragover .drop-zone-icon { color: var(--rose); }
.drop-zone-text {
  font-size: 0.85rem;
  color: var(--text-muted);
}
.drop-zone-hint {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 0.25rem;
}

/* ═══════════ Footer ═══════════ */
.admin-footer {
  max-width: 1280px;
  margin: 2rem auto 0;
  padding: 2rem;
  border-top: 1px solid var(--border);
  text-align: center;
  color: var(--text-dim);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ═══════════ Responsive ═══════════ */
@media (max-width: 640px) {
  .topbar { padding: 0 1rem; }
  .hero { padding: 2rem 1rem 1.5rem; }
  .hero h1 { font-size: 1.5rem; }
  .section-group { padding: 0 1rem 1.5rem; }
  .image-grid { grid-template-columns: 1fr; }
  .stats-row { flex-direction: column; }
  .topbar-badge { display: none; }
}

/* ═══════════ Scrollbar ═══════════ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

/* ═══════════ Floating bg decoration ═══════════ */
body::before {
  content: '';
  position: fixed;
  top: -40%;
  right: -20%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(244,63,94,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: -1;
}
body::after {
  content: '';
  position: fixed;
  bottom: -30%;
  left: -10%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(139,92,246,0.03) 0%, transparent 70%);
  pointer-events: none;
  z-index: -1;
}

/* ═══════════ Login Screen ═══════════ */
.login-screen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.login-screen.hidden {
  opacity: 0;
  transform: scale(1.02);
  pointer-events: none;
}
.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 3rem 2.5rem 2.5rem;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.4), 0 0 80px rgba(244,63,94,0.05);
  text-align: center;
  animation: modal-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}
.login-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--rose), #a855f7, var(--rose));
  background-size: 200% 100%;
  animation: shimmer 3s ease infinite;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.login-logo {
  font-family: 'Young Serif', serif;
  font-size: 2rem;
  color: var(--rose);
  margin-bottom: 0.25rem;
}
.login-subtitle {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  margin-bottom: 2rem;
}
.login-field {
  position: relative;
  margin-bottom: 1rem;
  text-align: left;
}
.login-field label {
  display: block;
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  margin-bottom: 0.4rem;
}
.login-field input {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 0.9rem;
  padding: 0.75rem 1rem;
  font-family: inherit;
  transition: all var(--transition);
  outline: none;
}
.login-field input:focus {
  border-color: var(--rose);
  box-shadow: 0 0 0 3px var(--rose-glow);
}
.login-field input::placeholder {
  color: var(--text-dim);
}
.login-btn {
  width: 100%;
  padding: 0.8rem;
  margin-top: 0.5rem;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--rose);
  color: #fff;
  font-size: 0.85rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: 0 4px 20px var(--rose-glow);
}
.login-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 28px var(--rose-glow);
}
.login-btn:active {
  transform: translateY(0);
}
.login-error {
  color: var(--rose);
  font-size: 0.75rem;
  margin-top: 0.75rem;
  min-height: 1.2em;
  transition: opacity var(--transition);
}
.login-field .toggle-pw {
  position: absolute;
  right: 0.75rem;
  top: 50%;
  transform: translateY(20%);
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding: 0.25rem;
  transition: color var(--transition);
}
.login-field .toggle-pw:hover {
  color: var(--text-muted);
}
.app-wrapper {
  transition: opacity 0.3s ease;
}
.app-wrapper.locked {
  opacity: 0;
  pointer-events: none;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-12px); }
  40% { transform: translateX(10px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(4px); }
}
</style>
</head>
<body>

<!-- ═══════════ LOGIN SCREEN ═══════════ -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo">Florela</div>
    <div class="login-subtitle">Admin Panel</div>
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="login-field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="login-field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
        <button type="button" class="toggle-pw" onclick="togglePassword()" aria-label="Toggle password visibility">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="pw-eye">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <button type="submit" class="login-btn" id="login-btn">Sign In</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<div class="app-wrapper locked" id="app-wrapper">

<!-- ═══════════ TOPBAR ═══════════ -->
<header class="topbar">
  <div class="topbar-inner">
    <div class="topbar-left">
      <a href="../" class="topbar-logo">Florela</a>
      <span class="topbar-badge">Admin Panel</span>
    </div>
    <div class="topbar-right">
      <a href="../" class="btn btn-ghost">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7"/></svg>
        Back to Site
      </a>
      <button class="btn btn-primary" id="btn-save-all" onclick="saveAllChanges()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save Changes
      </button>
      <button class="btn btn-success" id="btn-export" onclick="exportConfig()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export Config
      </button>
      <button class="btn btn-ghost" onclick="logout()" title="Sign out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</header>

<!-- ═══════════ HERO ═══════════ -->
<div class="hero">
  <h1>Image Manager</h1>
  <p>View, replace, and configure all images on the Florela website. Changes are saved locally and can be exported.</p>
  <div class="stats-row" id="stats-row">
    <!-- filled by JS -->
  </div>
</div>

<!-- ═══════════ CONTENT (filled by JS) ═══════════ -->
<main id="main-content"></main>

<!-- ═══════════ FOOTER ═══════════ -->
<footer class="admin-footer">
  Florela Admin · Image Manager · 2026
</footer>
</div><!-- end app-wrapper -->

<!-- ═══════════ TOAST CONTAINER ═══════════ -->
<div class="toast-container" id="toast-container"></div>

<!-- ═══════════ MODAL ═══════════ -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Replace Image</span>
      <button class="modal-close" onclick="closeModal()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="modal-preview" id="modal-preview">
        <img id="modal-preview-img" src="" alt="">
      </div>
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <svg class="drop-zone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p class="drop-zone-text">Click to upload or drag & drop</p>
        <p class="drop-zone-hint">Supports JPG, PNG, WebP · Max 5MB</p>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFileSelect(event)">
      <button class="btn btn-primary" style="width:100%;justify-content:center;" id="modal-apply-btn" onclick="applyImage()" disabled>
        Apply Image
      </button>
    </div>
  </div>
</div>

<!-- Hidden file input for direct upload -->
<input type="file" id="direct-file-input" accept="image/*" style="display:none">

<script>
// ════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════
const AUTH_SESSION_KEY = 'florela_admin_auth';
// Hashed credentials (SHA-256) so they aren't plain text in source
const VALID_EMAIL_HASH = '954f8150d1e4tried'; // placeholder, computed below
const VALID_PW_HASH = 'placeholder';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function checkCredentials(email, password) {
  const emailHash = await sha256(email.trim().toLowerCase());
  const pwHash = await sha256(password);
  // Hardcoded hashes of florela.ever@gmail.com / pc@2916
  return emailHash === 'dee0d587132bdcfe1ea27914a42e5ff6998f21418c0a2f554f7cafe297960166'
      && pwHash === 'd3512260f86dda4a2a926b02ba61c32899e100ad283d441bd0a33cac94585584';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errorEl = document.getElementById('login-error');
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;

  btn.textContent = 'Signing in…';
  btn.disabled = true;
  errorEl.textContent = '';

  // Small delay for feel
  await new Promise(r => setTimeout(r, 400));

  const valid = await checkCredentials(email, password);
  if (valid) {
    sessionStorage.setItem(AUTH_SESSION_KEY, 'true');
    unlockApp();
  } else {
    errorEl.textContent = 'Invalid email or password';
    btn.textContent = 'Sign In';
    btn.disabled = false;
    // Shake animation
    const card = document.querySelector('.login-card');
    card.style.animation = 'none';
    card.offsetHeight; // reflow
    card.style.animation = 'shake 0.4s ease';
  }
}

function unlockApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-wrapper').classList.remove('locked');
  setTimeout(() => {
    document.getElementById('login-screen').style.display = 'none';
  }, 500);
}

function togglePassword() {
  const inp = document.getElementById('login-password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function logout() {
  sessionStorage.removeItem(AUTH_SESSION_KEY);
  location.reload();
}

// Check session on load
(function checkSession() {
  if (sessionStorage.getItem(AUTH_SESSION_KEY) === 'true') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-wrapper').classList.remove('locked');
  }
})();

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let config = null;
let originalConfig = null;
let pendingImageData = null;
let currentEditId = null;
const STORAGE_KEY = 'florela_admin_overrides';

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
async function init() {
  try {
    const resp = await fetch('../site-config.json');
    config = await resp.json();
    originalConfig = JSON.parse(JSON.stringify(config));
    
    // Load any saved overrides from localStorage
    loadOverrides();
    
    renderStats();
    renderSections();
    setupDropZone();
  } catch (err) {
    console.error('Failed to load config:', err);
    showToast('Failed to load site-config.json', 'info');
  }
}

function loadOverrides() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    const overrides = JSON.parse(saved);
    
    config.images.forEach(img => {
      if (overrides[img.id]) {
        if (overrides[img.id].src) img.src = overrides[img.id].src;
        if (overrides[img.id].alt !== undefined) img.alt = overrides[img.id].alt;
        img._modified = true;
      }
    });
  } catch(e) {
    console.warn('Could not load overrides:', e);
  }
}

function saveOverrides() {
  const overrides = {};
  config.images.forEach((img, i) => {
    const orig = originalConfig.images[i];
    if (img.src !== orig.src || img.alt !== orig.alt) {
      overrides[img.id] = { src: img.src, alt: img.alt };
      img._modified = true;
    }
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(overrides));
}

// ════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════
function renderStats() {
  const sections = [...new Set(config.images.map(i => i.section))];
  const modified = config.images.filter(i => i._modified).length;
  
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-value" style="color:var(--rose)">${config.images.length}</div>
      <div class="stat-label">Total Images</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${sections.length}</div>
      <div class="stat-label">Sections</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:${modified > 0 ? 'var(--amber)' : 'var(--green)'}">${modified}</div>
      <div class="stat-label">Modified</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--green)">${config.images.length - modified}</div>
      <div class="stat-label">Unchanged</div>
    </div>
  `;
}

function renderSections() {
  const main = document.getElementById('main-content');
  const sections = {};
  
  config.images.forEach(img => {
    if (!sections[img.section]) sections[img.section] = [];
    sections[img.section].push(img);
  });
  
  let html = '';
  for (const [sectionName, images] of Object.entries(sections)) {
    html += `
      <div class="section-group">
        <div class="section-header">
          <div class="section-dot"></div>
          <span class="section-name">${sectionName}</span>
          <span class="section-count">${images.length} image${images.length > 1 ? 's' : ''}</span>
        </div>
        <div class="image-grid">
          ${images.map(img => renderCard(img)).join('')}
        </div>
      </div>
    `;
  }
  
  main.innerHTML = html;
}

function renderCard(img) {
  const isModified = img._modified;
  const imgSrc = img.src.startsWith('data:') ? img.src : '../' + img.src;
  
  return `
    <div class="image-card" id="card-${img.id}">
      <div class="image-card-preview" onclick="openUploadModal('${img.id}')">
        <div class="image-status ${isModified ? 'status-modified' : 'status-live'}">
          <span class="status-dot"></span>
          ${isModified ? 'Modified' : 'Live'}
        </div>
        <img src="${imgSrc}" alt="${escapeHtml(img.alt)}" loading="lazy">
        <div class="image-overlay">
          <div class="overlay-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <span class="overlay-text">Click to replace</span>
        </div>
      </div>
      <div class="image-card-body">
        <div class="image-card-label">${img.label}</div>
        <div class="image-card-id">${img.id}</div>
        <div class="alt-group">
          <label class="alt-label">Alt text</label>
          <textarea class="alt-input" 
            data-img-id="${img.id}"
            oninput="updateAlt('${img.id}', this.value)"
          >${escapeHtml(img.alt)}</textarea>
        </div>
      </div>
      <div class="image-card-actions">
        <button class="btn btn-ghost btn-sm" onclick="openUploadModal('${img.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Replace
        </button>
        ${isModified ? `
        <button class="btn btn-ghost btn-sm" onclick="revertImage('${img.id}')" style="color:var(--amber)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.64-11.36L1 10"/></svg>
          Revert
        </button>
        ` : ''}
      </div>
    </div>
  `;
}

// ════════════════════════════════════════════
// MODAL & UPLOAD
// ════════════════════════════════════════════
function openUploadModal(imgId) {
  currentEditId = imgId;
  pendingImageData = null;
  
  const img = config.images.find(i => i.id === imgId);
  const imgSrc = img.src.startsWith('data:') ? img.src : '../' + img.src;
  
  document.getElementById('modal-title').textContent = 'Replace: ' + img.label;
  document.getElementById('modal-preview-img').src = imgSrc;
  document.getElementById('modal-apply-btn').disabled = true;
  document.getElementById('modal-backdrop').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(event) {
  if (event && event.target !== document.getElementById('modal-backdrop')) return;
  document.getElementById('modal-backdrop').classList.remove('active');
  document.body.style.overflow = '';
  currentEditId = null;
  pendingImageData = null;
  // Reset file input
  document.getElementById('file-input').value = '';
}

function setupDropZone() {
  const dz = document.getElementById('drop-zone');
  
  dz.addEventListener('dragover', e => {
    e.preventDefault();
    dz.classList.add('dragover');
  });
  
  dz.addEventListener('dragleave', () => {
    dz.classList.remove('dragover');
  });
  
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('dragover');
    const files = e.dataTransfer.files;
    if (files.length > 0 && files[0].type.startsWith('image/')) {
      processFile(files[0]);
    }
  });
}

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (file && file.type.startsWith('image/')) {
    processFile(file);
  }
}

function processFile(file) {
  if (file.size > 5 * 1024 * 1024) {
    showToast('Image must be under 5MB', 'info');
    return;
  }
  
  const reader = new FileReader();
  reader.onload = e => {
    pendingImageData = e.target.result;
    document.getElementById('modal-preview-img').src = pendingImageData;
    document.getElementById('modal-apply-btn').disabled = false;
    showToast('Image loaded — click Apply to confirm', 'success');
  };
  reader.readAsDataURL(file);
}

function applyImage() {
  if (!currentEditId || !pendingImageData) return;
  
  const img = config.images.find(i => i.id === currentEditId);
  img.src = pendingImageData;
  img._modified = true;
  
  saveOverrides();
  renderStats();
  renderSections();
  closeModal();
  showToast(`Updated: ${img.label}`, 'success');
}

function revertImage(imgId) {
  const idx = config.images.findIndex(i => i.id === imgId);
  const orig = originalConfig.images[idx];
  
  config.images[idx].src = orig.src;
  config.images[idx].alt = orig.alt;
  config.images[idx]._modified = false;
  
  saveOverrides();
  renderStats();
  renderSections();
  showToast(`Reverted: ${config.images[idx].label}`, 'success');
}

// ════════════════════════════════════════════
// ALT TEXT
// ════════════════════════════════════════════
function updateAlt(imgId, value) {
  const img = config.images.find(i => i.id === imgId);
  img.alt = value;
  // Don't re-render, just mark for save
}

// ════════════════════════════════════════════
// SAVE & EXPORT
// ════════════════════════════════════════════
function saveAllChanges() {
  // Save alt text changes
  document.querySelectorAll('.alt-input').forEach(textarea => {
    const id = textarea.dataset.imgId;
    const img = config.images.find(i => i.id === id);
    if (img) img.alt = textarea.value;
  });
  
  saveOverrides();
  renderStats();
  renderSections();
  showToast('All changes saved locally', 'success');
}

function exportConfig() {
  // Build clean config for export
  const exportData = {
    images: config.images.map(img => ({
      id: img.id,
      section: img.section,
      label: img.label,
      src: img.src,
      alt: img.alt,
      width: img.width,
      height: img.height
    }))
  };
  
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'site-config.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Config exported — replace site-config.json in your project', 'success');
}

// ════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════
function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  
  const icon = type === 'success' 
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
  
  toast.innerHTML = icon + message;
  container.appendChild(toast);
  
  setTimeout(() => {
    toast.style.animation = 'toast-out 0.3s ease-in forwards';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

// ════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════
init();
</script>
</body>
</html>
